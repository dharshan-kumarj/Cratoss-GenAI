version: '3.8'

services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: cratoss-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - cratoss-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Backend RAG Service
  backend:
    build:
      context: ./Cratoss--RAG
      dockerfile: Dockerfile
    container_name: cratoss-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./Cratoss--RAG/data:/app/data
      - ./Cratoss--RAG/vectorstore:/app/vectorstore
      - backend_cache:/root/.cache
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - cratoss-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend Service
  frontend:
    build:
      context: ./Cratoss_Frontend
      dockerfile: Dockerfile
    container_name: cratoss-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cratoss-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  cratoss-network:
    driver: bridge
    name: cratoss-network

volumes:
  ollama_data:
    name: cratoss-ollama-data
  backend_cache:
    name: cratoss-backend-cache
