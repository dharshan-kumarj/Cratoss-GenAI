version: '3.8'

services:

  ollama:
    image: ollama/ollama:latest
    container_name: cratoss-ollama
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Automatically pull the model on startup
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull llama3.2 && wait"
    healthcheck:
      # Use a simple shell check if wget/curl are missing, or try wget with different flags
      test: ["CMD-SHELL", "wget -q --spider http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Backend RAG Service
  backend:
    build:
      context: ./Cratoss--RAG
      dockerfile: Dockerfile
    container_name: cratoss-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./Cratoss--RAG/data:/app/data
      - ./Cratoss--RAG/vectorstore:/app/vectorstore
      - backend_cache:/root/.cache
    environment:
      - PYTHONUNBUFFERED=1
      # Since ollama is in host mode, use the host's IP address (172.17.0.1) or your actual local IP
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - cratoss-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend Service
  frontend:
    build:
      context: ./Cratoss_Frontend
      dockerfile: Dockerfile
    container_name: cratoss-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cratoss-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cratoss-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - cratoss-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cratoss-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cratoss-network

networks:
  cratoss-network:
    driver: bridge
    name: cratoss-network

volumes:
  ollama_data:
    name: cratoss-ollama-data
  backend_cache:
    name: cratoss-backend-cache
  prometheus_data:
  grafana_data:
